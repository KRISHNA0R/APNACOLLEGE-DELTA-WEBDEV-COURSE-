<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspanandrowspan</title>
</head>
<body>
    <table border="black">
        <caption> food menu </caption>
        <thead>
            <tr>
                <th rowspan="2">item</th>
                <th colspan="2">price</th>
            </tr>
            <tr>
                <th>inr</th>
                <th>usd</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>frooti</td>
                <td>19</td>
                <td>0.19</td>
            </tr>
            <tr>
                <td>samosa</td>
                <td>9</td>
                <td>0.9</td>
            </tr>
            <tr>
                <td>chips</td>
                <td>20</td>
                <td>0.29</td>
            </tr>

        </tbody>
        
    </table>
    
</body>
</html>
